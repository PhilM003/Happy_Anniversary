<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1st Anniversary Quiz ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../static/css/quiz.css">
</head>

<body>
    <div class="floating-photos-bg" id="photo-bg">
    </div>

    <div class="main-container">
        <div id="start-screen" class="quiz-card animate__animated animate__fadeIn">
            <h1 class="text-3xl font-bold text-rose-500 mb-4">Anniversary Quiz ❤️</h1>
            <p class="text-gray-600 mb-8">มาดูกันว่าจำเรื่องราวของเราได้กี่ข้อ!</p>
            <button onclick="startQuiz()"
                class="w-full py-4 bg-rose-500 text-white rounded-full font-bold shadow-lg text-xl">เริ่มเล่นเลย!</button>
        </div>

        <div id="quiz-screen" class="quiz-card hidden animate__animated animate__fadeIn">
            <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
                <div id="progress-bar"></div>
            </div>
            <div id="question-number" class="text-rose-400 text-sm mb-2">ข้อที่ 1/10</div>
            <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-6">คำถามจะขึ้นตรงนี้?</h2>
            <div id="options-container" class="flex flex-col">
            </div>
        </div>

        <div id="result-screen" class="quiz-card hidden animate__animated animate__zoomIn">
            <h1 class="text-4xl mb-4">🏆</h1>
            <h2 class="text-2xl font-bold text-rose-500 mb-2">เก่งมากกก!</h2>
            <p id="score-text" class="text-gray-700 text-xl mb-6">ได้คะแนน 0/10</p>
            <div class="bg-pink-50 p-4 rounded-xl mb-8">
                <p id="comment-text" class="text-gray-600 italic">"ความรักของเรามันสุดยอดจริงๆ"</p>
            </div>
            <button onclick="location.reload()"
                class="w-full py-3 bg-rose-500 text-white rounded-full font-bold">เล่นอีกรอบ ❤️</button>
            <button onclick="location.href='../templates/1_first_page.html'"
                class="w-full py-3 bg-rose-500 text-white rounded-full font-bold"
                style="margin-top: 10px;">ย้อนกลับ</button>
        </div>
    </div>
</body>
<script src="../static/js/quiz.js"></script>

</html>
